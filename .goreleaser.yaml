version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: awload
    main: ./cmd/awload
    binary: awload
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: awload
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  github:
    owner: itcaat
    name: adventureworks-workload
  mode: replace
